name: Benchmarks

on:
    # The eventbus-latency-slo job gates PRs on the END-297 local-IPC round-trip
    # p99 latency SLO (<1ms). Scoped to paths that can plausibly affect IPC
    # latency so we don't run a bench on every PR. Other jobs in this workflow
    # (benchmarks, load-tests) remain workflow_dispatch-only and are gated by
    # per-job `if` conditions below; they are informational and expensive to
    # run on every PR.
    pull_request:
        branches: [ main ]
        paths:
            - "daemoneye-eventbus/**"
            - "collector-core/**"
            - ".github/workflows/benchmarks.yml"
            # Toolchain or workspace-level dep changes can shift Tokio/compiler
            # behavior and move p99 without touching the eventbus crate itself.
            - "Cargo.toml"
            - "Cargo.lock"
            - "rust-toolchain.toml"
    workflow_dispatch:
        inputs:
            suite:
                description: "Benchmark suite to run"
                required: false
                default: "all"
                type: choice
                options:
                    - all
                    - wal_benchmarks
                    - eventbus_benchmarks
                    - serialization_benchmarks
                    - system_benchmarks
                    - process_collector_benchmarks

# Restrict permissions to minimum required
permissions:
    contents: read

defaults:
    run:
        shell: bash

env:
    CARGO_TERM_COLOR: always
    CI: true

jobs:
    benchmarks:
        # Informational benchmark suite; runs only on manual dispatch to avoid
        # spending PR CI time on non-gating criterion runs.
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Restore baseline benchmarks
              uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: target/criterion
                  key: criterion-baseline-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml',
                      'Cargo.lock') }}

            - name: Run benchmarks
              env:
                  BENCH_SUITE: ${{ inputs.suite }}
              run: |
                  set -o pipefail
                  if [ "$BENCH_SUITE" = "all" ]; then
                    mise x -- cargo bench --package procmond 2>&1 | tee bench-output.txt
                  else
                    mise x -- cargo bench --package procmond --bench "$BENCH_SUITE" 2>&1 | tee bench-output.txt
                  fi

            - name: Check for performance regression
              # CI runners have variable performance; use a generous 20% threshold
              # to avoid false positives while still catching significant regressions.
              run: |
                  if grep -q "Performance has regressed" bench-output.txt; then
                    echo "::warning::Performance regression detected in benchmarks"
                    grep -A2 "Performance has regressed" bench-output.txt
                    if grep -oP 'change: \+\K[0-9.]+' bench-output.txt | awk '{if ($1 > 20.0) exit 1}'; then
                      echo "All regressions within 20% threshold (CI runner noise tolerance)"
                    else
                      echo "::error::Benchmark regression exceeds 20% threshold"
                      exit 1
                    fi
                  else
                    echo "No performance regressions detected"
                  fi

            - name: Save baseline benchmarks
              uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              if: github.ref == 'refs/heads/main'
              with:
                  path: target/criterion
                  key: criterion-baseline-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml',
                      'Cargo.lock') }}

            - name: Upload benchmark results
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: always()
              with:
                  name: benchmark-results
                  path: bench-output.txt
                  retention-days: 30

    load-tests:
        # Informational load tests; runs only on manual dispatch.
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Run load tests
              run: |
                  set -o pipefail
                  NO_COLOR=1 TERM=dumb mise x -- cargo test --package procmond --test load_tests -- --ignored --nocapture 2>&1 | tee load-test-output.txt

            - name: Upload load test results
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              if: always()
              with:
                  name: load-test-results
                  path: load-test-output.txt
                  retention-days: 30

    # END-297 acceptance-criterion gate: local-IPC round-trip p99 latency < 1ms.
    # See daemoneye-eventbus/benches/ipc_performance.rs::latency_p99_slo.
    # Gated on Linux and macOS only; Windows and FreeBSD are informational per
    # the END-297 plan (Key Technical Decisions) and the AGENTS.md OS support
    # matrix.
    eventbus-latency-slo:
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
        runs-on: ${{ matrix.os }}
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Run END-297 latency p99 SLO bench (<1ms)
              # Filter anchored with ^...$ so it matches only the SLO bench ID
              # and not the pre-existing `latency/*` bench IDs in the same file.
              run: |
                  set -o pipefail
                  mise x -- cargo bench --package daemoneye-eventbus --bench ipc_performance -- '^latency_p99_slo$' 2>&1 | tee eventbus-latency-slo.txt

            - name: Upload latency SLO results
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: always()
              with:
                  name: eventbus-latency-slo-${{ matrix.os }}
                  path: eventbus-latency-slo.txt
                  retention-days: 30
