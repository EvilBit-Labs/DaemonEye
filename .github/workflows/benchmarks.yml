name: Benchmarks

on:
    # All jobs in this workflow are manual-dispatch only. Benchmarks are not run
    # automatically in CI: shared GitHub runners are too inconsistent for
    # latency/throughput measurement to gate on. Run benchmarks locally, or via
    # workflow_dispatch when a deliberate measurement is needed.
    workflow_dispatch:
        inputs:
            suite:
                description: "Benchmark suite to run"
                required: false
                default: "all"
                type: choice
                options:
                    - all
                    - wal_benchmarks
                    - eventbus_benchmarks
                    - serialization_benchmarks
                    - system_benchmarks
                    - process_collector_benchmarks

# Serialize manual runs per ref so overlapping dispatches don't contend on the
# shared criterion baseline cache / artifact state. cancel-in-progress is false
# (unlike ci.yml) so an in-flight measurement is allowed to finish rather than
# being killed mid-benchmark.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

# Restrict permissions to minimum required
permissions:
    contents: read

defaults:
    run:
        shell: bash

env:
    CARGO_TERM_COLOR: always
    CI: true

jobs:
    benchmarks:
        # Informational benchmark suite; runs only on manual dispatch to avoid
        # spending PR CI time on non-gating criterion runs.
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Restore baseline benchmarks
              uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: target/criterion
                  key: criterion-baseline-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml',
                      'Cargo.lock') }}

            - name: Run benchmarks
              env:
                  BENCH_SUITE: ${{ inputs.suite }}
              run: |
                  set -o pipefail
                  if [ "$BENCH_SUITE" = "all" ]; then
                    mise x -- cargo bench --package procmond 2>&1 | tee bench-output.txt
                  else
                    mise x -- cargo bench --package procmond --bench "$BENCH_SUITE" 2>&1 | tee bench-output.txt
                  fi

            - name: Check for performance regression
              # CI runners have variable performance; use a generous 20% threshold
              # to avoid false positives while still catching significant regressions.
              run: |
                  if grep -q "Performance has regressed" bench-output.txt; then
                    echo "::warning::Performance regression detected in benchmarks"
                    grep -A2 "Performance has regressed" bench-output.txt
                    if grep -oP 'change: \+\K[0-9.]+' bench-output.txt | awk '{if ($1 > 20.0) exit 1}'; then
                      echo "All regressions within 20% threshold (CI runner noise tolerance)"
                    else
                      echo "::error::Benchmark regression exceeds 20% threshold"
                      exit 1
                    fi
                  else
                    echo "No performance regressions detected"
                  fi

            - name: Save baseline benchmarks
              uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              if: github.ref == 'refs/heads/main'
              with:
                  path: target/criterion
                  key: criterion-baseline-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml',
                      'Cargo.lock') }}

            - name: Upload benchmark results
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: always()
              with:
                  name: benchmark-results
                  path: bench-output.txt
                  retention-days: 30

    load-tests:
        # Informational load tests; runs only on manual dispatch.
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Run load tests
              run: |
                  set -o pipefail
                  NO_COLOR=1 TERM=dumb mise x -- cargo test --package procmond --test load_tests -- --ignored --nocapture 2>&1 | tee load-test-output.txt

            - name: Upload load test results
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              if: always()
              with:
                  name: load-test-results
                  path: load-test-output.txt
                  retention-days: 30
