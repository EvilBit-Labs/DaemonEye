name: Deploy Documentation

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

defaults:
    run:
        shell: bash

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup mdBook
              uses: jontze/action-mdbook@6c0be56d14c4bf16861b00af61f50ff7400ce502 # v4.0.0
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  mdbook-version: latest
                  use-mermaid: true
                  use-toc: true
                  use-admonish: true

            - name: Install cargo-binstall
              uses: cargo-bins/cargo-binstall@30b5ca8b54e1dcffd9548bc87ede1531310fdc67 # v1.20.0

            - name: Install mdbook plugins
              run:
                  cargo binstall mdbook-tabs mdbook-i18n-helpers mdbook-yml-header
                  mdbook-image-size --no-confirm

            - name: Build rustdoc
              run: |
                  mise x -- cargo doc --no-deps --document-private-items --target-dir target
                  mkdir -p docs/book/api
                  cp -r target/doc/* docs/book/api/

            - name: Build mdBook
              run: |
                  cd docs
                  mise x -- mdbook build

            - name: Setup Pages
              if: github.ref == 'refs/heads/main'
              uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

            - name: Upload artifact
              if: github.ref == 'refs/heads/main'
              uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
              with:
                  path: docs/book

    deploy:
        if: github.ref == 'refs/heads/main'
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
