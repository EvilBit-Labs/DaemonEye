name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

# Restrict permissions to minimum required (principle of least privilege)
permissions:
    contents: read

defaults:
    run:
        shell: bash

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    CI: true
    GITHUB_ACTIONS: true

jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Ensure rustfmt and clippy are installed
              run: rustup component add rustfmt clippy

            - name: Check formatting
              run: just lint-rust

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Run tests (all features)
              run: mise x -- cargo nextest run --profile ci --all-features

            - name: Build release
              run: mise x -- cargo build --release --all-features

    test-cross-platform:
        strategy:
            matrix:
                # Note: While in active development, the matrix is limited to reduce CI load and time. Future iterations should expand the matrix to cover all supported platforms.
                # Code is intentionally commented out to make it easier to expand in the future.
                include:
                    # Primary Support - Linux
                    # - os: ubuntu-24.04
                    #   platform: "Linux"
                    # Disabled: ARM runners are flaky on GitHub Actions
                    # - os: ubuntu-24.04-arm
                    #   platform: "Linux"
                    # Primary Support - macOS (using available runners)
                    - os: macos-15
                      platform: "macOS"
                    # - os: macos-14
                    #   platform: "macOS"
                    # - os: macos-13
                    #   platform: "macOS"
                    # Primary Support - Windows
                    # - os: windows-2025
                    #   platform: "Windows"
                    - os: windows-2022
                      platform: "Windows"
                    # Secondary Support - Linux (using available runners)
                    - os: ubuntu-22.04
                      platform: "Linux"
                    # Note: Ubuntu 20.04, 18.04, RHEL 7, FreeBSD, and Windows Server 2019 testing would require custom runners
                    # Note: macOS 12 (Monterey) testing would require custom runners

        runs-on: ${{ matrix.os }}
        needs: quality
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            # Run tests and build the release binary
            - run: mise x -- cargo nextest run --profile ci --all-features
            - run: mise x -- cargo build --release --all-features

    coverage:
        runs-on: ubuntu-latest
        needs: [test, test-cross-platform, quality]
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Generate coverage
              run: mise x -- cargo llvm-cov --all-features --no-report

            - name: Combine coverage reports
              run: mise x -- cargo llvm-cov report --lcov --output-path lcov.info

            - name: Upload to Codecov
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              with:
                  files: lcov.info
                  fail_ci_if_error: false
                  token: ${{ secrets.CODECOV_TOKEN }}
                  slug: EvilBit-Labs/daemoneye
            - uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0
              with:
                  token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
                  files: target/lcov.info

    benchmarks:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Restore baseline benchmarks
              uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: target/criterion
                  key: criterion-baseline-${{ runner.os }}

            - name: Run benchmarks
              run: mise x -- cargo bench --package procmond 2>&1 | tee bench-output.txt

            - name: Check for performance regression
              run: |
                  # Criterion reports "regressed" when performance degrades beyond noise threshold.
                  # Fail CI if any benchmark regresses more than 10%.
                  if grep -q "Performance has regressed" bench-output.txt; then
                    echo "::warning::Performance regression detected in benchmarks"
                    grep -A2 "Performance has regressed" bench-output.txt
                    if grep -oP 'change: \+\K[0-9.]+' bench-output.txt | awk '{if ($1 > 10.0) exit 1}'; then
                      echo "All regressions within 10% threshold"
                    else
                      echo "::error::Benchmark regression exceeds 10% threshold"
                      exit 1
                    fi
                  else
                    echo "No performance regressions detected"
                  fi

            - name: Save baseline benchmarks
              uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              if: github.ref == 'refs/heads/main'
              with:
                  path: target/criterion
                  key: criterion-baseline-${{ runner.os }}

            - name: Run load tests
              run: NO_COLOR=1 TERM=dumb mise x -- cargo test --package procmond --test load_tests -- --ignored --nocapture 2>&1 | tee load-test-output.txt

            - name: Upload benchmark results
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              if: always()
              with:
                  name: benchmark-results
                  path: |
                      bench-output.txt
                      load-test-output.txt
                  retention-days: 30
