# Release workflow for DaemonEye
#
# Triggered by pushing a semver tag (e.g. v0.1.0).
# Builds 3 Rust binaries (procmond, daemoneye-agent, daemoneye-cli) across
# 6 targets using GoReleaser with platform-specific configs (one job per OS),
# Cosign for keyless signing, and Syft for SBOM generation.

name: Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write
    id-token: write
    attestations: write

env:
    CARGO_TERM_COLOR: always

jobs:
    release-linux:
        name: Release (Linux)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - uses: jdx/mise-action@v3
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@1.91.0
              with:
                  targets: >-
                      x86_64-unknown-linux-gnu,
                      aarch64-unknown-linux-gnu

            - name: Install cross-compilation dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@v7
              with:
                  distribution: goreleaser
                  version: "~> v2"
                  args: release --clean --config .goreleaser-linux.yaml
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    release-macos:
        name: Release (macOS)
        runs-on: macos-15
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - uses: jdx/mise-action@v3
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@1.91.0
              with:
                  targets: >-
                      x86_64-apple-darwin,
                      aarch64-apple-darwin

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@v7
              with:
                  distribution: goreleaser
                  version: "~> v2"
                  args: release --clean --config .goreleaser-macos.yaml
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    release-windows:
        name: Release (Windows)
        runs-on: windows-2022
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - uses: jdx/mise-action@v3
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@1.91.0
              with:
                  targets: >-
                      x86_64-pc-windows-msvc,
                      aarch64-pc-windows-msvc

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@v7
              with:
                  distribution: goreleaser
                  version: "~> v2"
                  args: release --clean --config .goreleaser-windows.yaml
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
