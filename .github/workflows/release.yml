# Release workflow for DaemonEye
#
# Triggered by pushing a semver tag (e.g. v0.1.0).
# Builds 3 Rust binaries (procmond, daemoneye-agent, daemoneye-cli) across
# 6 targets using GoReleaser with platform-specific configs (one job per OS).

name: Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write
    id-token: write
    attestations: write

env:
    CARGO_TERM_COLOR: always

jobs:
    release-linux:
        name: Release (Linux)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0
            - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
              with:
                  toolchain: stable
                  targets: >-
                      x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

            - name: Install cross-compilation dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
              with:
                  distribution: goreleaser
                  version: "~> v2"
                  args: release --clean --config .goreleaser-linux.yaml
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    release-macos:
        name: Release (macOS)
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0
            - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
              with:
                  toolchain: stable
                  targets: >-
                      x86_64-apple-darwin, aarch64-apple-darwin

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
              with:
                  distribution: goreleaser
                  version: "~> v2"
                  args: release --clean --config .goreleaser-macos.yaml
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    release-windows:
        name: Release (Windows)
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0
            - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
              with:
                  toolchain: stable
                  targets: >-
                      x86_64-pc-windows-msvc, aarch64-pc-windows-msvc

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
              with:
                  distribution: goreleaser
                  version: "~> v2"
                  args: release --clean --config .goreleaser-windows.yaml
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
