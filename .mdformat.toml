# mdformat configuration - consistent with Prettier and markdownlint
exclude = [
    "venv/**",
    "**/node_modules/**",
    "**/*.txt",
    "**/*.mdc",
    "**/*.tpl.md",
    "**/CHANGELOG.md",
    "target/**",
    "megalinter-reports/**",
]
validate = true
number = true
wrap = "no"
end_of_line = "lf"
extensions = [
    "gfm",
    "front_matters",
    "footnote",
    "simple_breaks",
    "gfm_alerts",
    "toc",
]
