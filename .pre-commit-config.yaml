# .pre-commit-config.yaml

repos:
    # 🧼 Standard code cleanup hooks (language agnostic)
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: check-added-large-files
            args: [ "--maxkb=10240" ]
          - id: check-case-conflict
          - id: check-merge-conflict
          - id: check-illegal-windows-names
          - id: check-json
            types: [ json ]
          - id: check-toml
            types: [ toml ]
          - id: check-yaml
            args: [ --allow-multiple-documents ]
            types: [ yaml ]
          - id: check-xml
            types: [ xml ]
          - id: mixed-line-ending
            types: [ text ]
            args: [ --fix=auto ]
          - id: check-vcs-permalinks

    - repo: https://github.com/FeryET/pre-commit-rust
      rev: v1.2.1
      hooks:
          - id: fmt
            types: [ rust ]
          - id: clippy
            types: [ rust ]
          - id: cargo-check
            types: [ rust ]
          - id: build
            types: [ rust ]

    # 🧪 GitHub Actions validation
    - repo: https://github.com/rhysd/actionlint
      rev: v1.7.12 # v1.7.12
      hooks:
          - id: actionlint
            files: ".github/workflows/"
            exclude: ^.github/workflows/release.yml$

    # 🐚 Shell script validation
    - repo: https://github.com/koalaman/shellcheck-precommit
      rev: v0.11.0
      hooks:
          - id: shellcheck
            types: [ shell ]
            exclude: ^.github/workflows/release.yml$|^.claude

    # Temporarily disabled due to issues with cargo-machete while we are stubbing out the project
    - repo: https://github.com/bnjbvr/cargo-machete
      rev: v0.9.2
      hooks:
          - id: cargo-machete
            types: [ cargo, cargo-lock ]

    # 📝 Markdown formatting and linting (temporarily disabled in CI due to path issues)
    - repo: https://github.com/executablebooks/mdformat
      rev: 1.0.0
      hooks:
          - id: mdformat
            additional_dependencies:
                - mdformat-gfm
                - mdformat-admon
                - mdformat-config
                - mdformat-footnote
                - mdformat-simple-breaks
                - mdformat-web
                - mdformat-gfm-alerts
                - mdformat-toc
                - mdformat-front-matters
            types: [ markdown ]

    # 🔒 Security audit for Rust dependencies (moved to CI)
    - repo: local
      hooks:
          - id: cargo-audit
            name: cargo-audit
            entry: cargo audit
            language: system
            types: [ cargo, cargo-lock ]
            pass_filenames: false
            always_run: true
    - repo: https://github.com/DevinR528/cargo-sort
      rev: v2.1.3
      hooks:
          - id: cargo-sort
            types: [ cargo, cargo-lock ]
